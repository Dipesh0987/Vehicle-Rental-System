<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Rent A Vechicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              poppins: ["Poppins", "sans-serif"],
            },
            colors: {
              accent: "#E58C4E",
              panel: "#2C766E",
              ink: "#0E2528",
              muted: "#6C7074",
              paper: "#F2F3F1",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="min-h-screen bg-paper font-poppins auth-bg text-ink">
    <main class="relative mx-auto flex min-h-screen w-[95%] max-w-[1250px] items-center justify-center py-8">
      <div class="login-hero-orb one" aria-hidden="true"></div>
      <div class="login-hero-orb two" aria-hidden="true"></div>

      <section class="glass-card float-in relative w-full max-w-[920px] overflow-hidden rounded-3xl p-6 sm:p-8">
        <div class="grid gap-7 lg:grid-cols-[1fr,1.05fr] lg:items-center">
          <aside class="space-y-4 fade-up">
            <a href="index.html" class="text-[13px] font-semibold text-[#3f5557] hover:text-panel">← Back to Home</a>
            <p class="inline-block rounded-full bg-[#e8f2ef] px-4 py-1 text-[11px] font-semibold uppercase tracking-[0.2em] text-panel">
              Secure Access
            </p>
            <h1 class="text-[34px] font-bold leading-tight text-ink sm:text-[40px]">
              Welcome back to your ride dashboard
            </h1>
            <p class="text-[14px] leading-relaxed text-[#415255]">
              Sign in quickly and continue managing bookings, profile settings, and upcoming rentals.
            </p>

            <div class="grid gap-2 sm:grid-cols-2 fade-up delay-1">
              <div class="login-badge rounded-2xl px-4 py-3 text-[12px] text-[#2b4346]">Fast Email Access</div>
              <div class="login-badge rounded-2xl px-4 py-3 text-[12px] text-[#2b4346]">Google Sign In</div>
            </div>
          </aside>

          <div class="rounded-2xl bg-white/80 p-4 shadow-[0_15px_30px_rgba(12,35,38,0.12)] sm:p-5 fade-up delay-1">
            <div id="loginBanner" class="hidden rounded-xl px-3 py-2 text-[13px]"></div>

            <form id="loginForm" class="mt-1 space-y-4 fade-up delay-2" novalidate>
          <label class="block" for="email">
            <span class="mb-2 block text-[14px] font-semibold text-[#2b4144]">Email</span>
            <div class="input-shell rounded-xl px-3 py-2">
              <input
                id="email"
                name="email"
                type="email"
                required
                autocomplete="email"
                class="w-full border-0 bg-transparent text-[14px] text-ink outline-none"
                placeholder="you@example.com"
              />
            </div>
          </label>

          <label class="block" for="password">
            <span class="mb-2 block text-[14px] font-semibold text-[#2b4144]">Password</span>
            <div class="input-shell rounded-xl px-3 py-2">
              <input
                id="password"
                name="password"
                type="password"
                required
                minlength="6"
                autocomplete="current-password"
                class="w-full border-0 bg-transparent text-[14px] text-ink outline-none"
                placeholder="Minimum 6 characters"
              />
            </div>
          </label>

          <div class="flex items-center justify-between text-[13px]">
            <button id="forgotPassword" class="font-semibold text-panel hover:underline" type="button">
              Forgot password?
            </button>
            <span class="text-[#576668]">Required fields*</span>
          </div>

              <button
                type="submit"
                class="cta-btn w-full rounded-full bg-accent px-5 py-3 text-[15px] font-semibold text-white"
              >
                Login to Home Dashboard
              </button>

              <button
                id="googleSignIn"
                type="button"
                class="w-full rounded-full border border-[#d8dfdb] bg-white px-5 py-3 text-[14px] font-semibold text-[#23393b] transition hover:bg-[#f7f8f7]"
              >
                Continue with Google
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script src="assets/js/auth.js"></script>
    <script>
      window.VehicleAuthUI.init("login");
    </script>
  </body>
</html>
