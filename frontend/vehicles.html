<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vehicles | Rent A Vehicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              poppins: ["Poppins", "sans-serif"],
            },
            colors: {
              accent: "#E58C4E",
              panel: "#2C766E",
              ink: "#0E2528",
              muted: "#6C7074",
              paper: "#F2F3F1",
            },
            keyframes: {
              fadeUp: {
                to: {
                  opacity: "1",
                  transform: "translateY(0)",
                },
              },
              cardLift: {
                from: {
                  opacity: "0",
                  transform: "translateY(18px)",
                },
                to: {
                  opacity: "1",
                  transform: "translateY(0)",
                },
              },
              glowPulse: {
                "0%, 100%": {
                  opacity: "0.65",
                },
                "50%": {
                  opacity: "1",
                },
              },
            },
            animation: {
              fadeUp: "fadeUp 640ms ease forwards",
              cardLift: "cardLift 700ms cubic-bezier(0.22, 1, 0.36, 1) forwards",
              glowPulse: "glowPulse 3.8s ease-in-out infinite",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-paper font-poppins text-ink">
    <main class="relative min-h-screen overflow-hidden">
      <div class="pointer-events-none absolute left-[-80px] top-[-80px] h-[280px] w-[280px] rounded-full bg-[radial-gradient(circle_at_32%_30%,rgba(229,140,78,0.52),rgba(229,140,78,0.08))] blur-[8px]"></div>
      <div class="pointer-events-none absolute bottom-[-90px] right-[-60px] h-[260px] w-[260px] rounded-full bg-[radial-gradient(circle_at_38%_35%,rgba(44,118,110,0.58),rgba(44,118,110,0.12))] blur-[8px]"></div>

      <header class="relative z-20 mx-auto flex w-[95%] max-w-[1320px] items-center justify-between py-4 opacity-0 animate-fadeUp">
        <a href="index.html" class="group relative text-ink transition duration-200 hover:-translate-y-[1px] hover:text-[#164144]">
          <span class="block bg-[linear-gradient(120deg,#0e2528,#123f43_42%,#1f6660)] bg-clip-text text-[22px] font-extrabold leading-none tracking-tight text-transparent lg:text-[30px]">
            RENT A VEHICLE
          </span>
          <span class="mt-1 block h-[2px] w-20 rounded-full bg-[linear-gradient(90deg,#E58C4E,#2C766E)] opacity-75 animate-glowPulse"></span>
        </a>
      </header>

      <section class="relative z-10 mx-auto w-[95%] max-w-[1320px] rounded-[28px] border border-white/65 bg-[linear-gradient(160deg,rgba(255,255,255,0.9),rgba(240,246,243,0.82))] p-5 shadow-[0_28px_60px_rgba(10,31,34,0.14)] sm:p-7 lg:p-8">
        <h1 class="text-[34px] font-bold leading-[1.1] tracking-[-0.02em] text-ink sm:text-[46px]">Premium Fleet Listing</h1>
        <p class="mt-3 max-w-[720px] text-[15px] leading-relaxed text-[#355053] sm:text-[16px]">Dummy listings will be shown in a professional card layout with consistent ordering and attractive interactions.</p>
      </section>
    </main>
    <script src="../backend/js/auth.js"></script>
    <script>
      window.VehicleAuthUI.init("home");
    </script>
  </body>
</html>
