<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Rent A Vechicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              poppins: ["Poppins", "sans-serif"],
            },
            colors: {
              accent: "#E58C4E",
              panel: "#2C766E",
              ink: "#0E2528",
              muted: "#6C7074",
              paper: "#F2F3F1",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="min-h-screen bg-[#F2F3F1] font-poppins text-ink">
    <main class="mx-auto min-h-screen w-[95%] max-w-[1300px] py-5">
      <header class="flex items-center justify-between rounded-2xl bg-white px-4 py-3 shadow-[0_14px_28px_rgba(10,35,38,0.12)] sm:px-6">
        <a href="index.html" class="text-[20px] font-extrabold tracking-tight text-ink">RENT A VECHICLE</a>
        <div id="dashboardProfileSlot" class="text-[14px] text-[#576668]">Signed in user</div>
      </header>

      <section class="mt-6 grid gap-4 lg:grid-cols-2">
        <article class="rounded-3xl bg-white p-6 shadow-[0_14px_34px_rgba(10,35,38,0.11)]">
          <p class="text-[12px] uppercase tracking-[0.2em] text-panel">Dashboard</p>
          <h1 class="mt-2 text-[34px] font-bold">Welcome to your account</h1>
          <p class="mt-3 text-[15px] text-[#4d5f62]">
            You are logged in via dummy frontend authentication flow.
          </p>
        </article>

        <article class="rounded-3xl bg-white p-6 shadow-[0_14px_34px_rgba(10,35,38,0.11)]">
          <h2 class="text-[20px] font-bold">Quick Overview</h2>
          <ul class="mt-4 space-y-3 text-[14px] text-[#4d5f62]">
            <li class="rounded-xl bg-[#f3f5f3] px-3 py-2">Active Rentals: 03</li>
            <li class="rounded-xl bg-[#f3f5f3] px-3 py-2">Pending Requests: 02</li>
            <li class="rounded-xl bg-[#f3f5f3] px-3 py-2">Profile: Editable from top right</li>
          </ul>
        </article>
      </section>
    </main>

    <script src="assets/js/auth.js"></script>
    <script>
      window.VehicleAuthUI.init("dashboard");
    </script>
  </body>
</html>
