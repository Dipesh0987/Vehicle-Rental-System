<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-md w-96">
<h2 class="text-2xl font-bold mb-6 text-center">Register</h2>

<div id="message" class="text-sm mb-4 text-center text-red-500"></div>

<form id="registerForm">

<input type="text" id="name" placeholder="Full Name"
class="w-full mb-4 p-2 border rounded" required>

<input type="email" id="email" placeholder="Email"
class="w-full mb-4 p-2 border rounded" required>

<input type="password" id="password" placeholder="Password (min 8 chars)"
class="w-full mb-4 p-2 border rounded" required>

<button type="submit"
class="w-full bg-orange-500 text-white p-2 rounded">
Register
</button>

</form>

<p class="text-sm mt-4 text-center">
Already have an account?
<a href="login.html" class="text-blue-500">Login</a>
</p>

</div>

<script src="register.js"></script>

</body>
</html>
