<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rent A Car</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              poppins: ['Poppins', 'sans-serif'],
            },
            colors: {
              accent: '#E58C4E',
              panel: '#2C766E',
              ink: '#0E2528',
              muted: '#6C7074',
              paper: '#F2F3F1',
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="font-poppins bg-white">
    <main id="app" class="min-h-screen">
      <section class="relative min-h-screen overflow-hidden bg-[#F2F3F1]">
        <div class="hero-watermark" aria-hidden="true">WAS</div>

        <div class="absolute inset-y-0 right-0 w-[31.5%] bg-panel"></div>

        <div class="relative z-20 mx-auto w-[95%] max-w-[1390px] pb-8 pt-6 lg:pt-8">
          <header class="grid grid-cols-[auto,1fr,auto] items-center gap-6">
            <div class="text-ink">
              <p class="text-[24px] font-extrabold leading-none tracking-tight lg:text-[32px]">RENT A CAR</p>
              <p class="-mt-1 text-[7px] font-semibold uppercase tracking-[0.16em] text-[#1B2E2F] lg:text-[11px]">
              Luxury Car Service
              </p>
            </div>

            <nav class="hidden items-center justify-start gap-10 pl-6 text-[16px] font-medium text-[#2F3336] lg:flex">
              <a class="text-accent" href="#">Home</a>
              <a href="#">How It Work</a>
              <a href="#">Rental Deal</a>
              <a href="#">Why Choose Us</a>
              <a href="#">Contact Us</a>
            </nav>

            <div class="hidden items-center gap-8 pr-8 text-[16px] text-white lg:flex">
              <a href="#">Sign In</a>
              <button
                type="button"
                class="rounded-full bg-accent px-8 py-3 text-[16px] font-medium leading-none"
              >
                Sign Up
              </button>
            </div>
          </header>

          <div class="relative mt-8 min-h-[780px] lg:mt-10">
            <div class="w-full lg:w-[58%]">
              <div class="rounded-md bg-[#F5F6F4] p-8 lg:p-10">
                <h1 class="max-w-[760px] text-[52px] font-bold leading-[1.12] tracking-[-0.02em] text-ink lg:text-[74px]">
                  Fast And Easy Way To Rent A Car
                </h1>
                <p class="mt-6 max-w-[790px] text-[16px] leading-[1.65] text-[#3E4448] lg:text-[18px]">
                  Sed volutpat sed nunc vel porttitor. Fusce placerat aliquam dolor non pretium.
                  Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere
                </p>
              </div>

              <form class="mt-8 grid grid-cols-1 gap-x-6 gap-y-5 lg:grid-cols-2">
                <label class="block">
                  <span class="text-[20px] font-medium text-[#2D3337] lg:text-[18px]">Select Your a Car Type</span>
                  <input
                    type="text"
                    value="Jeep-Diesel-Model-2021"
                    class="mt-3 h-[52px] w-full rounded-full border-0 bg-white px-7 text-[17px] text-[#B7BBC0] outline-none lg:h-[52px] lg:text-[16px]"
                  />
                </label>

                <label class="block">
                  <span class="text-[20px] font-medium text-[#2D3337] lg:text-[18px]">Where to Pick-Up</span>
                  <input
                    type="text"
                    value="201 S Clinton St #166, Iowa City"
                    class="mt-3 h-[52px] w-full rounded-full border-0 bg-white px-7 text-[17px] text-[#B7BBC0] outline-none lg:h-[52px] lg:text-[16px]"
                  />
                </label>

                <label class="block">
                  <span class="text-[20px] font-medium text-[#2D3337] lg:text-[18px]">Date of Pick Up/Time</span>
                  <input
                    type="text"
                    value="11-March-2023, 11:00 AM"
                    class="mt-3 h-[52px] w-full rounded-full border-0 bg-white px-7 text-[17px] text-[#B7BBC0] outline-none lg:h-[52px] lg:text-[16px]"
                  />
                </label>

                <label class="block">
                  <span class="text-[20px] font-medium text-[#2D3337] lg:text-[18px]">Date of Drop off/Time</span>
                  <input
                    type="text"
                    value="15-March-2023, 12:00 PM"
                    class="mt-3 h-[52px] w-full rounded-full border-0 bg-white px-7 text-[17px] text-[#B7BBC0] outline-none lg:h-[52px] lg:text-[16px]"
                  />
                </label>

                <button
                  type="button"
                  class="mt-3 h-[56px] rounded-full bg-accent text-[24px] font-medium text-white lg:col-span-1 lg:h-[56px] lg:text-[18px]"
                >
                  Search
                </button>
              </form>
            </div>

            <img
              src="assets/images/car.jpg"
              alt="Black jeep car"
              class="car-hero-image absolute bottom-5 right-[-3%] z-10 hidden w-[62%] max-w-[970px] lg:block"
            />
          </div>

          <div class="px-2 pt-6 lg:hidden">
            <img
              src="assets/images/car.jpg"
              alt="Black jeep car"
              class="car-hero-image w-full"
            />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
