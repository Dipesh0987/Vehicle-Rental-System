<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rent A Vechicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              poppins: ['Poppins', 'sans-serif'],
            },
            colors: {
              accent: '#E58C4E',
              panel: '#2C766E',
              ink: '#0E2528',
              muted: '#6C7074',
              paper: '#F2F3F1',
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="h-screen overflow-hidden bg-white font-poppins">
    <main id="app" class="h-screen">
      <section class="relative h-screen overflow-hidden bg-[#F2F3F1]">
        <div class="hero-watermark" aria-hidden="true">WAS</div>

        <div class="absolute inset-y-0 right-0 w-[31.5%] bg-panel"></div>

        <div class="relative z-20 mx-auto h-full w-[95%] max-w-[1390px] pb-4 pt-4 lg:pt-5">
          <header class="grid grid-cols-[auto,1fr,auto] items-center gap-6">
            <div class="text-ink">
              <p class="text-[24px] font-extrabold leading-none tracking-tight lg:text-[32px]">RENT A VECHICLE</p>
              <p class="-mt-1 text-[7px] font-semibold uppercase tracking-[0.16em] text-[#1B2E2F] lg:text-[11px]">
              Luxury Vechicle Service
              </p>
            </div>

            <nav class="hidden items-center justify-start gap-10 pl-6 text-[16px] font-medium text-[#2F3336] lg:flex">
              <a class="text-accent" href="#">Home</a>
              <a href="#">How It Work</a>
              <a href="#">Rental Deal</a>
              <a href="#">Why Choose Us</a>
              <a href="#">Contact Us</a>
            </nav>

            <div class="hidden items-center gap-8 pr-8 text-[16px] text-white lg:flex">
              <a href="login.html">Sign In</a>
              <button
                type="button"
                class="rounded-full bg-accent px-8 py-3 text-[16px] font-medium leading-none"
              >
                Sign Up
              </button>
            </div>
          </header>

          <div class="relative mt-4 h-[calc(100vh-112px)] lg:mt-5">
            <div class="relative z-20 w-full lg:w-[60%]">
              <div class="rounded-md bg-[#F5F6F4] p-7 lg:p-8">
                <h1 class="max-w-[760px] text-[48px] font-bold leading-[1.1] tracking-[-0.02em] text-ink lg:text-[66px]">
                  Fast And Easy Way To Rent A Vechicle
                </h1>
                <p class="mt-4 max-w-[790px] text-[15px] leading-[1.55] text-[#3E4448] lg:text-[16px]">
                  Sed volutpat sed nunc vel porttitor. Fusce placerat aliquam dolor non pretium.
                  Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere
                </p>
              </div>

              <form class="mt-5 grid grid-cols-1 gap-x-2 gap-y-4 lg:grid-cols-2 lg:gap-x-2">
                <label class="block">
                  <span class="text-[18px] font-medium text-[#2D3337] lg:text-[16px]">Select Your a Vechicle Type</span>
                  <input
                    type="text"
                    value="Jeep-Diesel-Model-2021"
                    class="mt-2 h-[42px] w-[80%] rounded-full border-0 bg-white px-5 text-[14px] text-[#B7BBC0] outline-none lg:h-[42px] lg:w-[78%] lg:text-[14px]"
                  />
                </label>

                <label class="block">
                  <span class="text-[18px] font-medium text-[#2D3337] lg:text-[16px]">Where to Pick-Up</span>
                  <input
                    type="text"
                    value="201 S Clinton St #166, Iowa City"
                    class="mt-2 h-[42px] w-[80%] rounded-full border-0 bg-white px-5 text-[14px] text-[#B7BBC0] outline-none lg:h-[42px] lg:w-[78%] lg:text-[14px]"
                  />
                </label>

                <label class="block">
                  <span class="text-[18px] font-medium text-[#2D3337] lg:text-[16px]">Date of Pick Up/Time</span>
                  <input
                    type="text"
                    value="11-March-2023, 11:00 AM"
                    class="mt-2 h-[42px] w-[80%] rounded-full border-0 bg-white px-5 text-[14px] text-[#B7BBC0] outline-none lg:h-[42px] lg:w-[78%] lg:text-[14px]"
                  />
                </label>

                <label class="block">
                  <span class="text-[18px] font-medium text-[#2D3337] lg:text-[16px]">Date of Drop off/Time</span>
                  <input
                    type="text"
                    value="15-March-2023, 12:00 PM"
                    class="mt-2 h-[42px] w-[80%] rounded-full border-0 bg-white px-5 text-[14px] text-[#B7BBC0] outline-none lg:h-[42px] lg:w-[78%] lg:text-[14px]"
                  />
                </label>

                <button
                  type="button"
                  class="mt-2 h-[44px] w-[80%] rounded-full bg-accent text-[18px] font-medium text-white lg:col-span-1 lg:h-[44px] lg:w-[78%] lg:text-[15px]"
                >
                  Search
                </button>
              </form>
            </div>

            <img
              src="assets/images/car-transparent.png"
              alt="Black jeep vechicle"
              class="car-hero-image absolute bottom-0 right-[-3%] z-0 hidden w-[50%] max-w-[780px] lg:block"
            />
          </div>

          <div class="px-2 pt-6 lg:hidden">
            <img
              src="assets/images/car-transparent.png"
              alt="Black jeep vechicle"
              class="car-hero-image w-full"
            />
          </div>
        </div>
      </section>
    </main>
    <script src="assets/js/auth.js"></script>
    <script>
      window.VehicleAuthUI.init("home");
    </script>
  </body>
</html>
