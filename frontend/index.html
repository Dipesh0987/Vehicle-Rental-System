<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rent A Car</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              poppins: ['Poppins', 'sans-serif'],
            },
            colors: {
              accent: '#E58C4E',
              panel: '#2C766E',
              ink: '#0E2528',
              muted: '#6C7074',
              paper: '#F2F3F1',
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="font-poppins bg-white">
    <main id="app" class="min-h-screen bg-paper">
      <section class="relative min-h-screen overflow-hidden">
        <div class="absolute inset-y-0 right-0 w-[31%] bg-panel"></div>

        <div class="relative z-10 mx-auto w-[92%] max-w-[1300px] pt-6 pb-10 lg:pt-8">
          <header class="flex items-center justify-between">
            <div class="text-ink">
              <p class="text-[40px] font-extrabold leading-none tracking-tight">RENT A CAR</p>
              <p class="-mt-1 text-[10px] font-semibold uppercase tracking-[0.16em] text-[#1B2E2F]">
                Luxury Car Service
              </p>
            </div>

            <nav class="hidden items-center gap-12 text-[28px] font-medium text-[#2F3336] lg:flex">
              <a class="text-accent" href="#">Home</a>
              <a href="#">How It Work</a>
              <a href="#">Rental Deal</a>
              <a href="#">Why Choose Us</a>
              <a href="#">Contact Us</a>
            </nav>

            <div class="hidden items-center gap-10 pr-4 text-[32px] text-white lg:flex">
              <a href="#">Sign In</a>
              <button
                type="button"
                class="rounded-full bg-accent px-10 py-4 text-[32px] font-medium leading-none"
              >
                Sign Up
              </button>
            </div>
          </header>

          <div class="mt-16 lg:mt-20">
            <div class="max-w-[56%]">
              <div class="bg-[#F7F8F6] p-8">
                <h1 class="max-w-[620px] text-[74px] font-bold leading-[1.12] tracking-[-0.02em] text-ink">
                  Fast And Easy Way To Rent A Car
                </h1>
                <p class="mt-6 max-w-[760px] text-[30px] leading-[1.7] text-[#43484C]">
                  Sed volutpat sed nunc vel porttitor. Fusce placerat aliquam dolor non pretium.
                  Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere
                </p>
              </div>

              <form class="mt-8 grid grid-cols-1 gap-x-6 gap-y-5 lg:grid-cols-2">
                <label class="block">
                  <span class="text-[34px] font-medium text-[#2D3337]">Select Your a Car Type</span>
                  <input
                    type="text"
                    value="Jeep-Diesel-Model-2021"
                    class="mt-3 h-[62px] w-full rounded-full border-0 bg-white px-7 text-[28px] text-[#B7BBC0] outline-none"
                  />
                </label>

                <label class="block">
                  <span class="text-[34px] font-medium text-[#2D3337]">Where to Pick-Up</span>
                  <input
                    type="text"
                    value="201 S Clinton St #166, Iowa City"
                    class="mt-3 h-[62px] w-full rounded-full border-0 bg-white px-7 text-[28px] text-[#B7BBC0] outline-none"
                  />
                </label>

                <label class="block">
                  <span class="text-[34px] font-medium text-[#2D3337]">Date of Pick Up/Time</span>
                  <input
                    type="text"
                    value="11-March-2023, 11:0 AM"
                    class="mt-3 h-[62px] w-full rounded-full border-0 bg-white px-7 text-[28px] text-[#B7BBC0] outline-none"
                  />
                </label>

                <label class="block">
                  <span class="text-[34px] font-medium text-[#2D3337]">Date of Drop off/Time</span>
                  <input
                    type="text"
                    value="15-March-2023, 12:00 PM"
                    class="mt-3 h-[62px] w-full rounded-full border-0 bg-white px-7 text-[28px] text-[#B7BBC0] outline-none"
                  />
                </label>

                <button
                  type="button"
                  class="mt-2 h-[68px] rounded-full bg-accent text-[38px] font-medium text-white lg:col-span-1"
                >
                  Search
                </button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
