<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rent A Car</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              poppins: ['Poppins', 'sans-serif'],
            },
            colors: {
              accent: '#E58C4E',
              panel: '#2C766E',
              ink: '#0E2528',
              muted: '#6C7074',
              paper: '#F2F3F1',
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="font-poppins bg-white">
    <main id="app" class="min-h-screen bg-paper">
      <section class="relative min-h-screen overflow-hidden">
        <div class="hero-watermark" aria-hidden="true">WAS</div>
        <div class="absolute right-0 top-0 h-[40%] w-full bg-panel md:inset-y-0 md:h-full md:w-[31%]"></div>

        <div class="relative z-10 mx-auto w-[95%] max-w-[1340px] pt-6 pb-10 lg:pt-8">
          <header class="flex items-center justify-between">
            <div class="text-ink">
              <p class="text-[28px] font-extrabold leading-none tracking-tight lg:text-[40px]">RENT A CAR</p>
              <p class="-mt-1 text-[8px] font-semibold uppercase tracking-[0.16em] text-[#1B2E2F] lg:text-[10px]">
                Luxury Car Service
              </p>
            </div>

            <nav class="hidden items-center gap-10 text-[22px] font-medium text-[#2F3336] xl:flex">
              <a class="text-accent" href="#">Home</a>
              <a href="#">How It Work</a>
              <a href="#">Rental Deal</a>
              <a href="#">Why Choose Us</a>
              <a href="#">Contact Us</a>
            </nav>

            <div class="hidden items-center gap-8 pr-2 text-[22px] text-white md:flex lg:gap-10 lg:pr-4">
              <a href="#">Sign In</a>
              <button
                type="button"
                class="rounded-full bg-accent px-8 py-3 text-[22px] font-medium leading-none"
              >
                Sign Up
              </button>
            </div>
          </header>

          <div class="mt-10 lg:mt-14">
            <div class="max-w-full md:max-w-[60%]">
              <div class="bg-[#F7F8F6] p-8">
                <h1
                  class="max-w-[620px] text-[46px] font-bold leading-[1.12] tracking-[-0.02em] text-ink sm:text-[54px] lg:text-[66px]"
                >
                  Fast And Easy Way To Rent A Car
                </h1>
                <p class="mt-5 max-w-[760px] text-[16px] leading-[1.7] text-[#43484C] sm:text-[18px] lg:text-[26px]">
                  Sed volutpat sed nunc vel porttitor. Fusce placerat aliquam dolor non pretium.
                  Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere
                </p>
              </div>

              <form class="mt-8 grid grid-cols-1 gap-x-6 gap-y-5 lg:grid-cols-2">
                <label class="block">
                  <span class="text-[20px] font-medium text-[#2D3337] lg:text-[31px]">Select Your a Car Type</span>
                  <input
                    type="text"
                    value="Jeep-Diesel-Model-2021"
                    class="mt-3 h-[50px] w-full rounded-full border-0 bg-white px-7 text-[17px] text-[#B7BBC0] outline-none lg:h-[62px] lg:text-[26px]"
                  />
                </label>

                <label class="block">
                  <span class="text-[20px] font-medium text-[#2D3337] lg:text-[31px]">Where to Pick-Up</span>
                  <input
                    type="text"
                    value="201 S Clinton St #166, Iowa City"
                    class="mt-3 h-[50px] w-full rounded-full border-0 bg-white px-7 text-[17px] text-[#B7BBC0] outline-none lg:h-[62px] lg:text-[26px]"
                  />
                </label>

                <label class="block">
                  <span class="text-[20px] font-medium text-[#2D3337] lg:text-[31px]">Date of Pick Up/Time</span>
                  <input
                    type="text"
                    value="11-March-2023, 11:0 AM"
                    class="mt-3 h-[50px] w-full rounded-full border-0 bg-white px-7 text-[17px] text-[#B7BBC0] outline-none lg:h-[62px] lg:text-[26px]"
                  />
                </label>

                <label class="block">
                  <span class="text-[20px] font-medium text-[#2D3337] lg:text-[31px]">Date of Drop off/Time</span>
                  <input
                    type="text"
                    value="15-March-2023, 12:00 PM"
                    class="mt-3 h-[50px] w-full rounded-full border-0 bg-white px-7 text-[17px] text-[#B7BBC0] outline-none lg:h-[62px] lg:text-[26px]"
                  />
                </label>

                <button
                  type="button"
                  class="mt-2 h-[56px] rounded-full bg-accent text-[24px] font-medium text-white lg:col-span-1 lg:h-[68px] lg:text-[36px]"
                >
                  Search
                </button>
              </form>

              <img
                src="assets/images/car.jpg"
                alt="Black jeep car"
                class="mt-6 block w-full rounded-lg md:hidden"
              />
            </div>
          </div>
        </div>

        <img
          src="assets/images/car.jpg"
          alt="Black jeep car"
          class="absolute bottom-7 right-[-2%] z-10 hidden w-[62%] max-w-[920px] md:block"
        />
      </section>
    </main>
  </body>
</html>
